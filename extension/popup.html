<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>One-Click Video Downloader</title>
    <link rel="stylesheet" href="popup.css">
  </head>
  <body>
    <main>
      <header>
        <div>
          <p class="eyebrow">LOCAL VIDEO</p>
          <h1>Ready when the video is.</h1>
        </div>
        <span id="detected-count" class="count">0</span>
      </header>

      <section id="detection" class="card">
        <div class="status-row">
          <span id="status-dot" class="dot"></span>
          <div>
            <p id="plan-label" class="primary">Play a video on this page</p>
            <p id="plan-detail" class="secondary">Detection happens automatically.</p>
          </div>
        </div>
      </section>

      <div id="jobs-header" class="jobs-header hidden">
        <span>Downloads</span>
        <button id="clear-finished" class="text-button hidden">Clear finished</button>
      </div>
      <section id="jobs" class="jobs hidden" aria-live="polite"></section>

      <label id="cookie-option" class="option-row hidden">
        <input id="use-cookies" type="checkbox">
        <span>Use this site's browser cookies</span>
      </label>

      <button id="download" class="download" disabled>
        <span>Download best quality</span>
        <span aria-hidden="true">↓</span>
      </button>

      <button id="enable-deep" class="secondary-action hidden">
        Enable deep detection for this site
      </button>

      <label id="heading-option" class="option-row">
        <input id="use-heading" type="checkbox">
        <span>Use page headings for filenames</span>
      </label>

      <div class="footer-row">
        <span id="host-status">Checking local FFmpeg…</span>
        <button id="clear" class="text-button">Clear</button>
      </div>

      <p id="error" class="error hidden" role="alert"></p>
    </main>
    <script type="module" src="popup.js"></script>
  </body>
</html>
